<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>3D Animated Login Page</title>

  <link rel="stylesheet" href="./style.css">

  <!-- Three.js import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <main class="login-page">

    <!-- Background -->
    <div class="space-background" aria-hidden="true">
      <div class="stars stars-small"></div>
      <div class="stars stars-large"></div>

      <div class="space-glow blue-glow"></div>
      <div class="space-glow orange-glow"></div>

      <div class="planet planet-one"></div>
      <div class="planet planet-two"></div>
    </div>

    <!-- Three.js canvas is inserted here -->
    <div
      id="characterContainer"
      aria-hidden="true"
    ></div>

    <!-- Loading status -->
    <div
      id="modelLoader"
      class="model-loader"
      role="status"
      aria-live="polite"
    >
      Loading character...
    </div>

    <!-- Signup form -->
    <section
      id="signupCard"
      class="signup-card"
      aria-labelledby="signupTitle"
    >
      <h1 id="signupTitle">Sign Up</h1>

      <form id="signupForm" novalidate>

        <label class="input-box">
          <span class="field-icon" aria-hidden="true">♙</span>

          <input
            id="fullName"
            name="fullName"
            type="text"
            placeholder="Your name"
            autocomplete="name"
            maxlength="60"
          >
        </label>

        <label class="input-box">
          <span class="field-icon" aria-hidden="true">♙</span>

          <input
            id="username"
            name="username"
            type="text"
            placeholder="User name"
            autocomplete="username"
            maxlength="30"
          >
        </label>

        <label class="input-box">
          <span class="field-icon" aria-hidden="true">✉</span>

          <input
            id="email"
            name="email"
            type="email"
            placeholder="Email address"
            autocomplete="email"
            maxlength="100"
          >
        </label>

        <button
          id="nextButton"
          type="submit"
        >
          Next
        </button>

        <p
          id="formMessage"
          class="form-message"
          aria-live="polite"
        ></p>

      </form>
    </section>

  </main>

  <script
    type="module"
    src="./script.js"
  ></script>

</body>
</html>
