<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>3D Animated Character</title>

  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="loadingScreen">
    <div class="loader"></div>
    <p id="loadingText">Loading character...</p>
  </div>

  <div id="gameContainer"></div>

  <div class="instructions">
    <h2>Character Controls</h2>
    <p><strong>W / ↑</strong> Move forward</p>
    <p><strong>S / ↓</strong> Move backward</p>
    <p><strong>A / ←</strong> Turn left</p>
    <p><strong>D / →</strong> Turn right</p>
  </div>

  <div class="animation-buttons">
    <button data-animation="idle">Idle</button>
    <button data-animation="talking">Talking</button>
    <button data-animation="pointing">Pointing</button>
    <button data-animation="waving">Waving</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
