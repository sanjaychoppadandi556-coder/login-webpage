<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Animated Sign Up Page</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <main class="login-page">

    <!-- Background video -->
    <video
      id="introVideo"
      class="intro-video"
      autoplay
      muted
      playsinline
      preload="auto"
    >
      <source src="./153106.mp4" type="video/mp4">

      Your browser does not support video playback.
    </video>

    <!-- Fallback background -->
    <div class="fallback-background"></div>

    <!-- Dark overlay -->
    <div class="video-overlay"></div>

    <!-- Sign-up form -->
    <section
      id="signupCard"
      class="signup-card"
      aria-labelledby="signupTitle"
    >
      <h1 id="signupTitle">Sign Up</h1>

      <form id="signupForm" novalidate>

        <div class="input-box">
          <span class="input-icon">♙</span>

          <input
            id="fullName"
            type="text"
            placeholder="Your name"
            autocomplete="name"
            maxlength="60"
          >
        </div>

        <div class="input-box">
          <span class="input-icon">♙</span>

          <input
            id="username"
            type="text"
            placeholder="User name"
            autocomplete="username"
            maxlength="30"
          >
        </div>

        <div class="input-box">
          <span class="input-icon">✉</span>

          <input
            id="email"
            type="email"
            placeholder="Email address"
            autocomplete="email"
            maxlength="100"
          >
        </div>

        <button
          id="nextButton"
          type="submit"
        >
          Next
        </button>

        <p
          id="formMessage"
          class="form-message"
          aria-live="polite"
        ></p>

      </form>
    </section>

    <!-- Replay button -->
    <button
      id="replayButton"
      class="replay-button"
      type="button"
      aria-label="Replay animation"
    >
      ↻
    </button>

  </main>

  <script src="./script.js"></script>
</body>
</html>
